name: Weekly Benchmark

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  benchmark:
    name: Run Weekly Benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          cache: false

      - name: Install benchmark tools
        run: |
          sudo apt-get update
          sudo apt-get install -y wrk curl
          wget -q https://hey-release.s3.us-east-2.amazonaws.com/hey_linux_amd64
          chmod +x hey_linux_amd64
          sudo mv hey_linux_amd64 /usr/local/bin/hey

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-index-

      - name: Build Actix app
        working-directory: ./actix-app
        run: cargo build --release

      - name: Build Axum app
        working-directory: ./axum-app
        run: cargo build --release

      - name: Run benchmarks
        run: |
          RESULTS_DIR="benchmark_results"
          mkdir -p "$RESULTS_DIR"

          echo "Starting Actix server..."
          ./actix-app/target/release/actix-benchmark &
          ACTIX_PID=$!
          sleep 5

          echo "Running Actix benchmarks..."
          wrk -t4 -c100 -d30s --latency http://127.0.0.1:8080/hello > "$RESULTS_DIR/actix_light.txt" 2>&1 || true
          wrk -t2 -c50  -d20s --latency http://127.0.0.1:8080/heavy > "$RESULTS_DIR/actix_heavy.txt" 2>&1 || true
          wrk -t2 -c20  -d30s --latency http://127.0.0.1:8080/cpu   > "$RESULTS_DIR/actix_cpu.txt"   2>&1 || true
          wrk -t1 -c10  -d20s --latency http://127.0.0.1:8080/ram   > "$RESULTS_DIR/actix_ram.txt"   2>&1 || true

          kill "$ACTIX_PID" || true
          sleep 2

          echo "Starting Axum server..."
          ./axum-app/target/release/axum-benchmark &
          AXUM_PID=$!
          sleep 5

          echo "Running Axum benchmarks..."
          wrk -t4 -c100 -d30s --latency http://127.0.0.1:8081/hello > "$RESULTS_DIR/axum_light.txt" 2>&1 || true
          wrk -t2 -c50  -d20s --latency http://127.0.0.1:8081/heavy > "$RESULTS_DIR/axum_heavy.txt" 2>&1 || true
          wrk -t2 -c20  -d30s --latency http://127.0.0.1:8081/cpu   > "$RESULTS_DIR/axum_cpu.txt"   2>&1 || true
          wrk -t1 -c10  -d20s --latency http://127.0.0.1:8081/ram   > "$RESULTS_DIR/axum_ram.txt"   2>&1 || true

          kill "$AXUM_PID" || true
          echo "Benchmarks completed"

      - name: Generate benchmark report
        run: |
          python3 - << 'PYEOF'
          import subprocess
          import os
          from datetime import datetime

          def read_file(path):
              try:
                  with open(path) as f:
                      return f.read().strip()
              except FileNotFoundError:
                  return "No results available"

          def extract_rps(content):
              for line in content.splitlines():
                  if "Requests/sec" in line:
                      parts = line.split()
                      if len(parts) >= 2:
                          return parts[1]
              return "N/A"

          def extract_avg_latency(content):
              for line in content.splitlines():
                  stripped = line.strip()
                  if stripped.startswith("Latency"):
                      parts = stripped.split()
                      if len(parts) >= 2:
                          return parts[1]
              return "N/A"

          def extract_percentile(content, pct):
              for line in content.splitlines():
                  if line.strip().startswith(pct):
                      parts = line.split()
                      if len(parts) >= 2:
                          return parts[1]
              return "N/A"

          r = "benchmark_results"
          actix_light = read_file(f"{r}/actix_light.txt")
          actix_heavy = read_file(f"{r}/actix_heavy.txt")
          actix_cpu   = read_file(f"{r}/actix_cpu.txt")
          actix_ram   = read_file(f"{r}/actix_ram.txt")
          axum_light  = read_file(f"{r}/axum_light.txt")
          axum_heavy  = read_file(f"{r}/axum_heavy.txt")
          axum_cpu    = read_file(f"{r}/axum_cpu.txt")
          axum_ram    = read_file(f"{r}/axum_ram.txt")

          try:
              cpu   = subprocess.check_output("lscpu | grep 'Model name' | cut -d: -f2 | sed 's/^ *//'", shell=True).decode().strip()
              cores = subprocess.check_output("nproc", shell=True).decode().strip()
              mem   = subprocess.check_output("free -h | grep '^Mem:' | awk '{print $2}'", shell=True).decode().strip()
          except Exception:
              cpu, cores, mem = "Unknown", "Unknown", "Unknown"

          run_date = datetime.now().strftime("%Y-%m-%d")

          rows = [
              ("Light (req/sec)",   extract_rps(actix_light),              extract_rps(axum_light)),
              ("Light avg latency", extract_avg_latency(actix_light),      extract_avg_latency(axum_light)),
              ("Light p99 latency", extract_percentile(actix_light, "99%"), extract_percentile(axum_light, "99%")),
              ("Heavy (req/sec)",   extract_rps(actix_heavy),              extract_rps(axum_heavy)),
              ("Heavy avg latency", extract_avg_latency(actix_heavy),      extract_avg_latency(axum_heavy)),
              ("Heavy p99 latency", extract_percentile(actix_heavy, "99%"), extract_percentile(axum_heavy, "99%")),
              ("CPU (req/sec)",     extract_rps(actix_cpu),                extract_rps(axum_cpu)),
              ("RAM (req/sec)",     extract_rps(actix_ram),                extract_rps(axum_ram)),
          ]

          table_lines = ["| Metric | Actix | Axum |", "|--------|-------|------|"]
          for label, a, x in rows:
              table_lines.append(f"| {label} | {a} | {x} |")
          summary_table = "\n".join(table_lines)

          def section(title, content):
              return f"### {title}\n\n```\n{content}\n```\n"

          report = "\n".join([
              "# Benchmark Results",
              "",
              f"**Last Updated:** {run_date}",
              "**System:** GitHub Actions Runner (ubuntu-latest)",
              f"**CPU:** {cpu}",
              f"**Cores:** {cores}",
              f"**Memory:** {mem}",
              "",
              "## Summary",
              "",
              summary_table,
              "",
              "> Results may vary based on runner load and available resources.",
              "> For production comparisons, run benchmarks on dedicated hardware.",
              "",
              "## Detailed Results",
              "",
              section("Actix – Light Endpoint (30s, 4 threads, 100 connections)", actix_light).strip(),
              section("Axum – Light Endpoint (30s, 4 threads, 100 connections)", axum_light).strip(),
              section("Actix – Heavy Endpoint (20s, 2 threads, 50 connections)", actix_heavy).strip(),
              section("Axum – Heavy Endpoint (20s, 2 threads, 50 connections)", axum_heavy).strip(),
              section("Actix – CPU Endpoint (30s, 2 threads, 20 connections)", actix_cpu).strip(),
              section("Axum – CPU Endpoint (30s, 2 threads, 20 connections)", axum_cpu).strip(),
              section("Actix – RAM Endpoint (20s, 1 thread, 10 connections)", actix_ram).strip(),
              section("Axum – RAM Endpoint (20s, 1 thread, 10 connections)", axum_ram).strip(),
              "---",
              f"*Generated automatically by the [weekly-benchmark]({os.environ.get('GITHUB_SERVER_URL', 'https://github.com')}/{os.environ.get('GITHUB_REPOSITORY', '')}/actions/runs/{os.environ.get('GITHUB_RUN_ID', '')}) workflow*",
          ])

          with open("BENCHMARK_RESULTS.md", "w") as f:
              f.write(report)
          print("Report written to BENCHMARK_RESULTS.md")
          PYEOF

      - name: Create Pull Request with results
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update weekly benchmark results'
          title: 'Weekly Benchmark Results - ${{ github.run_number }}'
          body: |
            ## Automated Weekly Benchmark Results

            This PR contains the latest benchmark results from the weekly automated run.

            **Run Date:** ${{ github.run_id }}
            **Workflow Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            ### What's included
            - Updated `BENCHMARK_RESULTS.md` with the latest numbers
            - Actix and Axum compared across light, heavy, CPU, and RAM endpoints

            ### Review instructions
            1. Open `BENCHMARK_RESULTS.md` to review the summary table and raw output
            2. Compare with the previously merged results to spot regressions or improvements
            3. Merge this PR to update the benchmark history in the repository

            ---
            *This PR was created automatically by the weekly-benchmark workflow*
          branch: benchmark-results-${{ github.run_number }}
          delete-branch: true
          labels: |
            benchmark
            automated
          assignees: ${{ github.repository_owner }}
